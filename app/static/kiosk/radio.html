<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrbitDeck Radio Control</title>
    <link rel="stylesheet" href="/static/common/styles.css?v=20260313a" />
    <script defer src="/static/common/app.js?v=20260315a"></script>
    <script defer src="/static/kiosk/radio.js?v=20260315a"></script>
  </head>
  <body class="kiosk">
    <header>
      <h1>OrbitDeck Radio Control</h1>
      <div id="stationBadge" class="label mono">Station: --</div>
      <div class="label">Dedicated rig test page for ID-5100 and IC-705 validation.</div>
    </header>
    <main>
      <section class="card controls">
        <label for="radioRigModelPage">Rig Model</label>
        <select id="radioRigModelPage">
          <option value="id5100">Icom ID-5100</option>
          <option value="ic705">Icom IC-705</option>
        </select>
        <label for="radioTransportModePage">Transport</label>
        <select id="radioTransportModePage">
          <option value="usb">USB</option>
          <option value="wifi">Wi-Fi</option>
        </select>
        <div id="radioUsbFields">
          <label for="radioSerialDevicePage">Serial Device</label>
          <input id="radioSerialDevicePage" type="text" placeholder="/dev/cu.usbmodem113201" />
        </div>
        <div id="radioWifiFields" hidden>
          <label for="radioWifiHostPage">Wi-Fi Host</label>
          <input id="radioWifiHostPage" type="text" placeholder="192.168.2.70" />
          <label for="radioWifiUsernamePage">Wi-Fi Username</label>
          <input id="radioWifiUsernamePage" type="text" placeholder="demo-user" />
          <label for="radioWifiPasswordPage">Wi-Fi Password</label>
          <input id="radioWifiPasswordPage" type="password" />
          <label for="radioWifiControlPortPage">Wi-Fi Control Port</label>
          <input id="radioWifiControlPortPage" type="number" min="1" max="65535" step="1" />
        </div>
        <label for="radioBaudRatePage">Baud Rate</label>
        <input id="radioBaudRatePage" type="number" min="4800" max="19200" step="1" />
        <label for="radioCivAddressPage">CI-V Address</label>
        <input id="radioCivAddressPage" type="text" placeholder="0xA4" />
        <label for="radioSatIdPage">Satellite ID</label>
        <input id="radioSatIdPage" type="text" placeholder="iss-zarya" />
        <label for="radioVfoPage">Manual VFO</label>
        <select id="radioVfoPage">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="MAIN">MAIN</option>
          <option value="SUB">SUB</option>
        </select>
        <label for="radioFreqHzPage">Manual Frequency (Hz)</label>
        <input id="radioFreqHzPage" type="number" min="1000" step="1" />
        <label for="radioUplinkHzPage">Pair Uplink (Hz)</label>
        <input id="radioUplinkHzPage" type="number" min="1000" step="1" />
        <label for="radioUplinkModePage">Pair Uplink Mode</label>
        <select id="radioUplinkModePage">
          <option value="FM">FM</option>
          <option value="USB">USB</option>
          <option value="AM">AM</option>
          <option value="D-STAR">D-STAR</option>
        </select>
        <label for="radioDownlinkHzPage">Pair Downlink (Hz)</label>
        <input id="radioDownlinkHzPage" type="number" min="1000" step="1" />
        <label for="radioDownlinkModePage">Pair Downlink Mode</label>
        <select id="radioDownlinkModePage">
          <option value="FM">FM</option>
          <option value="USB">USB</option>
          <option value="AM">AM</option>
          <option value="D-STAR">D-STAR</option>
        </select>
        <div class="controls">
          <button id="saveRadioPage" type="button">Save Settings</button>
          <button id="connectRadioPage" type="button">Connect</button>
          <button id="pollRadioPage" type="button">Poll Rig</button>
          <button id="disconnectRadioPage" type="button">Disconnect</button>
          <button id="applyRadioPage" type="button">Apply Current Sat</button>
          <button id="setFreqRadioPage" type="button">Set Manual Frequency</button>
          <button id="setPairRadioPage" type="button">Apply Manual Pair</button>
        </div>
      </section>

      <section class="card controls">
        <h2>Runtime</h2>
        <pre id="radioRuntimePage" class="mono">Loading…</pre>
      </section>
    </main>
  </body>
</html>
