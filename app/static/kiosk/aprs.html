<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrbitDeck APRS</title>
    <link rel="stylesheet" href="/static/common/styles.css?v=20260314a" />
    <script defer src="/static/common/app.js?v=20260313e"></script>
    <script defer src="/static/kiosk/aprs.js?v=20260314a"></script>
  </head>
  <body class="kiosk">
    <header>
      <h1>OrbitDeck APRS</h1>
      <div id="stationBadge" class="label mono">Station: --</div>
      <div class="label">Dedicated APRS test page for Dire Wolf + IC-705 validation.</div>
    </header>
    <main>
      <section class="card controls">
        <label for="aprsCallsignPage">Callsign</label>
        <input id="aprsCallsignPage" type="text" placeholder="VK4ABC" />
        <label for="aprsSsidPage">SSID</label>
        <input id="aprsSsidPage" type="number" min="0" max="15" step="1" />
        <label for="aprsModePage">Operating Mode</label>
        <select id="aprsModePage">
          <option value="terrestrial">Terrestrial</option>
          <option value="satellite">Satellite</option>
        </select>
        <div id="aprsSatelliteModeGroup">
          <label for="aprsSatellitePage">APRS Satellite</label>
          <select id="aprsSatellitePage"></select>
          <label for="aprsChannelPage">Satellite APRS Channel</label>
          <select id="aprsChannelPage"></select>
        </div>
        <div id="aprsTerrestrialModeGroup">
          <label for="aprsTerrestrialFreqPage">Terrestrial Frequency (Hz)</label>
          <input id="aprsTerrestrialFreqPage" type="number" min="1000" step="1" />
          <div id="aprsRegionHintPage" class="label">Loading APRS region…</div>
        </div>
        <label for="aprsSerialDevicePage">Serial Device</label>
        <input id="aprsSerialDevicePage" type="text" placeholder="/dev/ttyUSB0" />
        <label for="aprsBaudRatePage">Baud Rate</label>
        <input id="aprsBaudRatePage" type="number" min="4800" max="19200" step="1" />
        <label for="aprsCivAddressPage">CI-V Address</label>
        <input id="aprsCivAddressPage" type="text" placeholder="0xA4" />
        <label for="aprsAudioInputPage">Audio Input</label>
        <input id="aprsAudioInputPage" type="text" placeholder="default" />
        <label for="aprsAudioOutputPage">Audio Output</label>
        <input id="aprsAudioOutputPage" type="text" placeholder="default" />
        <label for="aprsListenOnlyPage">Listen Only</label>
        <input id="aprsListenOnlyPage" type="checkbox" />
        <div id="aprsTerrestrialSettingsGroup">
          <label for="aprsTerrestrialPathPage">Terrestrial PATH</label>
          <input id="aprsTerrestrialPathPage" type="text" placeholder="WIDE1-1,WIDE2-1" />
          <label for="aprsTerrestrialCommentPage">Terrestrial Beacon Comment</label>
          <input id="aprsTerrestrialCommentPage" type="text" placeholder="OrbitDeck APRS" />
        </div>
        <div id="aprsSatelliteSettingsGroup">
          <label for="aprsSatellitePathPage">Satellite PATH</label>
          <input id="aprsSatellitePathPage" type="text" placeholder="ARISS" />
          <label for="aprsSatelliteCommentPage">Space Beacon Comment</label>
          <input id="aprsSatelliteCommentPage" type="text" placeholder="OrbitDeck Space APRS" />
        </div>
        <div id="aprsTargetMetaPage" class="label">Loading target profile…</div>
        <div class="controls">
          <button id="saveAprsPage" type="button">Save Settings</button>
          <button id="selectAprsTargetPage" type="button">Select Target</button>
          <button id="connectAprsPage" type="button">Connect</button>
          <button id="disconnectAprsPage" type="button">Disconnect</button>
          <a href="/settings">Back to Settings</a>
          <a href="/radio">Radio Page</a>
        </div>
      </section>

      <section class="card controls">
        <h2>Send</h2>
        <label for="aprsMessageToPage">Message To</label>
        <input id="aprsMessageToPage" type="text" placeholder="VK4XYZ-7" />
        <label for="aprsMessageBodyPage">Message Text</label>
        <input id="aprsMessageBodyPage" type="text" placeholder="Test from OrbitDeck" />
        <label for="aprsStatusPage">Status Text</label>
        <input id="aprsStatusPage" type="text" placeholder="OrbitDeck APRS status" />
        <label for="aprsPositionCommentPage">Position Comment</label>
        <input id="aprsPositionCommentPage" type="text" placeholder="Portable packet test" />
        <div class="controls">
          <button id="sendAprsMessagePage" type="button">Send Message</button>
          <button id="sendAprsStatusPage" type="button">Send Status</button>
          <button id="sendAprsPositionPage" type="button">Send Position</button>
        </div>
      </section>

      <section class="card controls">
        <h2>Runtime</h2>
        <div id="aprsTxStatusPage" class="label">Loading TX status…</div>
        <pre id="aprsRuntimePage" class="mono">Loading…</pre>
      </section>
    </main>
  </body>
</html>
