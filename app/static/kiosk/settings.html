<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISS Tracker Settings</title>
    <link rel="stylesheet" href="/static/common/styles.css?v=20260309b" />
    <script defer src="/static/common/app.js?v=20260308aj"></script>
    <script defer src="/static/kiosk/settings.js?v=20260308aj"></script>
  </head>
  <body class="kiosk">
    <header>
      <h1>ISS Tracker Settings</h1>
      <div id="clock" class="label"></div>
    </header>
    <main>
      <section class="card controls top-controls">
        <label for="issMode">ISS Display Mode</label>
        <select id="issMode">
          <option value="SunlitOnlyVideo">Video: ISS Sunlit</option>
          <option value="SunlitAndVisibleVideo">Video: Sunlit + Above Horizon</option>
          <option value="TelemetryOnly">Telemetry Only</option>
        </select>
        <button id="saveMode">Apply</button>
        <label for="trackSatSelect">Tracked Satellite</label>
        <select id="trackSatSelect"></select>
        <label for="displayTimezone">Display Timezone</label>
        <select id="displayTimezone"></select>
        <label for="passProfile">Pass Profile</label>
        <select id="passProfile">
          <option value="IssOnly">ISS Only</option>
          <option value="Favorites">Favorites</option>
        </select>
        <button id="editPassProfile">Edit Favorites</button>
        <div id="passProfileEditor" class="inline-editor hidden">
          <label for="passSatSelect">Pass Satellites (Favorites)</label>
          <select id="passSatSelect" multiple size="5"></select>
          <button id="savePassProfile">Save Pass Profile</button>
        </div>
      </section>

      <section class="card controls location-controls">
        <label for="locationMode">Location Source</label>
        <select id="locationMode">
          <option value="browser">System Location</option>
          <option value="gps">GPS</option>
          <option value="manual">Manual</option>
          <option value="auto">Auto</option>
        </select>
        <div id="manualLocationGroup" class="inline-editor hidden">
          <input id="manualLat" type="number" step="0.000001" placeholder="Manual lat" />
          <input id="manualLon" type="number" step="0.000001" placeholder="Manual lon" />
          <button id="applyManual">Apply Manual</button>
        </div>
        <div id="gpsLocationGroup" class="inline-editor hidden">
          <input id="gpsLat" type="number" step="0.000001" placeholder="GPS lat" />
          <input id="gpsLon" type="number" step="0.000001" placeholder="GPS lon" />
          <button id="applyGps">Apply GPS</button>
        </div>
      </section>

      <section class="card controls">
        <label for="videoSourcePrimary">Video Source Primary</label>
        <input id="videoSourcePrimary" type="text" placeholder="https://www.youtube.com/embed/..." />
        <label for="videoSourceSecondary">Video Source Secondary</label>
        <input id="videoSourceSecondary" type="text" placeholder="https://www.youtube.com/embed/... (optional)" />
        <button id="saveVideoSources">Save Video Sources</button>
      </section>

      <section class="card controls">
        <button id="refreshNow">Refresh Now</button>
        <button id="returnKiosk">Apply + Return To Kiosk</button>
      </section>
    </main>
  </body>
</html>
