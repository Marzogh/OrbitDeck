<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISS Tracker Settings</title>
    <link rel="stylesheet" href="/static/common/styles.css?v=20260310d" />
    <script defer src="/static/common/app.js?v=20260308aj"></script>
    <script defer src="/static/kiosk/settings.js?v=20260311a"></script>
  </head>
  <body class="kiosk">
    <header>
      <h1>ISS Tracker Settings</h1>
      <div id="clock" class="label"></div>
    </header>
    <main>
      <section class="card controls top-controls">
        <label for="issMode">ISS Display Mode</label>
        <select id="issMode">
          <option value="SunlitOnlyVideo">Video: ISS Sunlit</option>
          <option value="SunlitAndVisibleVideo">Video: Sunlit + Above Horizon</option>
          <option value="TelemetryOnly">Telemetry Only</option>
        </select>
        <button id="saveMode">Apply</button>
        <label for="trackSatSelect">Tracked Satellite</label>
        <select id="trackSatSelect"></select>
        <label for="displayTimezone">Display Timezone</label>
        <select id="displayTimezone"></select>
        <label for="passProfile">Pass Profile</label>
        <select id="passProfile">
          <option value="IssOnly">ISS Only</option>
          <option value="Favorites">Favorites</option>
        </select>
        <button id="editPassProfile">Edit Favorites</button>
        <div id="passProfileEditor" class="inline-editor hidden">
          <label for="passSatSelect">Pass Satellites (Favorites)</label>
          <select id="passSatSelect" multiple size="5"></select>
          <button id="savePassProfile">Save Pass Profile</button>
        </div>
      </section>

      <section class="card controls location-controls">
        <label for="locationMode">Location Source</label>
        <select id="locationMode">
          <option value="browser">System Location</option>
          <option value="gps">GPS</option>
          <option value="manual">Manual</option>
          <option value="auto">Auto</option>
        </select>
        <div id="manualLocationGroup" class="inline-editor hidden">
          <input id="manualLat" type="number" step="0.000001" placeholder="Manual lat" />
          <input id="manualLon" type="number" step="0.000001" placeholder="Manual lon" />
          <button id="applyManual">Apply Manual</button>
        </div>
        <div id="gpsLocationGroup" class="inline-editor hidden">
          <input id="gpsLat" type="number" step="0.000001" placeholder="GPS lat" />
          <input id="gpsLon" type="number" step="0.000001" placeholder="GPS lon" />
          <button id="applyGps">Apply GPS</button>
        </div>
      </section>

      <section class="card controls">
        <label for="videoSourcePrimary">Video Source Primary</label>
        <input id="videoSourcePrimary" type="text" placeholder="https://www.youtube.com/embed/..." />
        <label for="videoSourceSecondary">Video Source Secondary</label>
        <input id="videoSourceSecondary" type="text" placeholder="https://www.youtube.com/embed/... (optional)" />
        <button id="saveVideoSources">Save Video Sources</button>
      </section>

      <section class="card controls">
        <h2>Radio Control</h2>
        <label for="radioRigModel">Rig Model</label>
        <select id="radioRigModel">
          <option value="id5100">Icom ID-5100</option>
          <option value="ic705">Icom IC-705</option>
        </select>
        <label for="radioSerialDevice">Serial Device</label>
        <input id="radioSerialDevice" type="text" placeholder="/dev/ttyUSB0" />
        <label for="radioBaudRate">Baud Rate</label>
        <input id="radioBaudRate" type="number" min="4800" max="19200" step="1" />
        <label for="radioCivAddress">CI-V Address</label>
        <input id="radioCivAddress" type="text" placeholder="0x8C" />
        <label for="radioPollInterval">Poll Interval (ms)</label>
        <input id="radioPollInterval" type="number" min="100" max="10000" step="100" />
        <label for="radioAutoTrackInterval">Auto-Track Interval (ms)</label>
        <input id="radioAutoTrackInterval" type="number" min="200" max="10000" step="100" />
        <label for="radioEnabled">Radio Enabled</label>
        <input id="radioEnabled" type="checkbox" />
        <label for="radioAutoConnect">Auto Connect</label>
        <input id="radioAutoConnect" type="checkbox" />
        <label for="radioApplyModeTone">Apply Mode and Tone</label>
        <input id="radioApplyModeTone" type="checkbox" />
        <label for="radioSafeTxGuard">Safe TX Guard</label>
        <input id="radioSafeTxGuard" type="checkbox" />
        <div class="controls">
          <button id="saveRadioSettings">Save Radio Settings</button>
          <button id="connectRadio">Connect Radio</button>
          <button id="disconnectRadio">Disconnect Radio</button>
        </div>
        <div id="radioStatus" class="label">Rig: --</div>
      </section>

      <section class="card controls">
        <label for="devOverridesEnabled">Developer Overrides</label>
        <input id="devOverridesEnabled" type="checkbox" />
        <div id="devOverridesPanel" class="inline-editor hidden">
          <label for="devForceScene">Force Scene</label>
          <select id="devForceScene">
            <option value="auto">Auto</option>
            <option value="ongoing">Ongoing pass</option>
            <option value="upcoming">Upcoming pass</option>
            <option value="iss-upcoming">ISS upcoming</option>
            <option value="passes">Passes console</option>
            <option value="radio">Radio ops</option>
            <option value="video">Video</option>
          </select>
        </div>
        <button id="saveDevOverrides">Save Overrides</button>
      </section>

      <section class="card controls">
        <button id="refreshNow">Refresh Now</button>
        <button id="returnKiosk">Apply + Return To Kiosk</button>
        <button id="returnRotator">Return To Kiosk Rotator</button>
      </section>
    </main>
  </body>
</html>
