<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISS Tracker Lite</title>
    <link rel="stylesheet" href="/static/common/styles.css" />
    <script defer src="/static/common/app.js?v=20260308n"></script>
    <script defer src="/static/lite/lite.js?v=20260308n"></script>
  </head>
  <body>
    <header>
      <h1>ISS Tracker Lite</h1>
      <div id="clock" class="label"></div>
    </header>
    <main>
      <section class="card controls">
        <button id="useGeo">Use Browser Geolocation</button>
        <input id="lat" type="number" step="0.000001" placeholder="Latitude" />
        <input id="lon" type="number" step="0.000001" placeholder="Longitude" />
        <button id="saveManual">Save Manual Location</button>
      </section>

      <section class="card controls">
        <label for="issMode">ISS Display Mode</label>
        <select id="issMode">
          <option value="SunlitOnlyVideo">Video: ISS Sunlit</option>
          <option value="SunlitAndVisibleVideo">Video: Sunlit + Above Horizon</option>
          <option value="TelemetryOnly">Telemetry Only</option>
        </select>
        <button id="saveMode">Apply</button>
      </section>

      <section class="card">
        <div id="summary" class="value">Loading...</div>
        <div id="telemetry" class="label"></div>
      </section>

      <section class="card">
        <div class="label">Next Passes</div>
        <table>
          <thead>
            <tr><th>Sat</th><th>AOS</th><th>Max El</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>

      <section class="card">
        <div class="label">Tx/Rx Frequencies</div>
        <div id="freqStatus" class="label"></div>
        <table>
          <thead>
            <tr><th>Sat</th><th>Tx</th><th>Rx</th></tr>
          </thead>
          <tbody id="freqRows"></tbody>
        </table>
      </section>
    </main>
  </body>
</html>
